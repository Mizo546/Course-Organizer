<!doctype html>
<html>
<head>
  <title>Add Course - Course Organizer</title>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- HEADER -->
  <header class="title">
    <h1>Course Organizer</h1>
    <p>Organize your learning journey.</p>

    <nav class="headerlink">
      <a href="index.html">Home</a>
      <a href="courses.html">My Courses</a>
      <a href="add-course.html">Add Course</a>
      <a href="contact.html">Contact Us</a>
      <a href="signin.html" class="btn">Sign In</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="mainPage">
    <section class="container">

      <h2>Add a New Course</h2>
      <p>Fill in the details below to add a new course.</p>

      <!-- FORM -->
      <form class="course-form">

        <div class="input-group">
          <label>Course Name</label>
          <input type="text" placeholder="e.g. Data Structures" required>
        </div>

        <div class="input-group">
          <label>Instructor</label>
          <input type="text" placeholder="Instructor name" required>
        </div>

        <div class="input-group">
          <label>Credits</label>
          <input type="number" placeholder="e.g. 3" required>
        </div>

        <div class="input-group">
          <label>Status</label>
          <select required>
            <option value="">Select status</option>
            <option>Ongoing</option>
            <option>Completed</option>
            <option>Planned</option>
          </select>
        </div>

        <div class="input-group">
          <label>Notes</label>
          <textarea rows="4" placeholder="Optional notes..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Add Course</button>

      </form>

    </section>
  </main>
    <footer>
    Mazen Wael Madbouly Mohamed 20250828
  </footer>


</body>
</html>
