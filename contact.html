<body>

  <!-- HEADER -->
  <header class="title">
    <h1>Course Organizer</h1>
    <p>Organize your learning journey.</p>

    <nav class="headerlink">
      <a href="index.html">Home</a>
      <a href="courses.html">My Courses</a>
      <a href="add-course.html">Add Course</a>

  <!-- MAIN -->
  <main class="mainPage">
    <section class="container">

      <h2>Contact Us</h2>
      <p>If you have any questions or need help, feel free to reach out!</p>

      <!-- CONTACT FORM -->
      <form class="contact-form">

        <div class="input-group">
          <label>Name</label>
          <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Message</label>
          <textarea rows="5" placeholder="Write your message..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>

      </form>

    </section>
  </main>
