<!doctype html>
<html>
<head>
  <title>Sign In - Course Organizer</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- HEADER -->
  <header class="title">
    <h1>Course Organizer</h1>
    <p>Organize your learning journey.</p>

    <nav class="headerlink">
      <a href="index.html">Home</a>
      <a href="courses.html">My Courses</a>
      <a href="add-course.html">Add Course</a>
      <a href="contact.html">Contact Us</a>
      <a href="signin.html">Sign In</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="mainPage">
    <section class="container">

      <h2>Sign In</h2>
      <p>Access your account to manage your courses.</p>

      <!-- FORM -->
      <form class="auth-form">

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="submit-btn">Sign In</button>

      </form>

      <p class="extra-text">
        Don’t have an account? <a href="signup.html">Sign up</a>
      </p>

    </section>
  </main>
    <footer>
    Mazen Wael Madbouly Mohamed 20250828
  </footer>

</body>
</html>
